spring.application.name=Ecommerce


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}


security.jwt.secret=${JWT_SECRET}


stripe.api.key=${STRIPE_SECRET_KEY:}


management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.health.ratelimiters.enabled=true

management.tracing.sampling.probability=0.0
# management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]


resilience4j.circuitbreaker.instances.stripeService.sliding-window-size=10
resilience4j.circuitbreaker.instances.stripeService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.stripeService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.stripeService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.stripeService.failure-rate-threshold=50

resilience4j.ratelimiter.instances.loginRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.loginRateLimiter.limit-refresh-period=5000ms
resilience4j.ratelimiter.instances.loginRateLimiter.timeout-duration=500ms

resilience4j.ratelimiter.instances.checkoutRateLimiter.limit-for-period=3
resilience4j.ratelimiter.instances.checkoutRateLimiter.limit-refresh-period=5000ms
resilience4j.ratelimiter.instances.checkoutRateLimiter.timeout-duration=0ms

resilience4j.ratelimiter.enabled=false
resilience4j.ratelimiter.instances.registroRateLimiter.subscribe-for-events=false
resilience4j.ratelimiter.instances.registroRateLimiter.limit-for-period=10
resilience4j.ratelimiter.instances.registroRateLimiter.limit-refresh-period=1m
resilience4j.ratelimiter.instances.registroRateLimiter.timeout-duration=0ms
resilience4j.retry.instances.stripeRetry.max-attempts=5
resilience4j.retry.instances.stripeRetry.wait-duration=100ms
resilience4j.retry.instances.stripeRetry.enable-exponential-backoff=true
resilience4j.retry.instances.stripeRetry.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.stripeRetry.retry-exceptions=com.stripe.exception.StripeException,java.io.IOException
resilience4j.retry.instances.stripeRetry.ignore-exceptions=java.lang.IllegalStateException


resilience4j.bulkhead.instances.checkoutBulkhead.max-concurrent-calls=10
resilience4j.bulkhead.instances.checkoutBulkhead.max-wait-duration=100ms
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.acknowledge-mode=auto
 

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.from=${MAIL_FROM}

